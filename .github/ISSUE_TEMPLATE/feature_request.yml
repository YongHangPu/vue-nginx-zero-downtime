name: Feature Request
description: 提议一个新能力、模板增强或文档改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出新想法。如果方便的话，可以补充使用场景和希望解决的问题。

  - type: textarea
    id: motivation
    attributes:
      label: 使用场景
      description: 你遇到了什么问题？为什么现有方案不够？
      placeholder: 描述真实使用场景
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 希望新增什么能力、模板或文档？
      placeholder: 描述你理想中的实现方式
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你尝试过哪些 workaround？

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可附上示例代码、截图或相关链接
